  - id: py3
    source: "test.py"
    name: "Python 3"
    run:
      cmd: "/usr/bin/python3"
      args: ["{{source}}"]
      limits:
        wall_time_s: 9
        max_processes: 100
        memory_kb: 102400
    version_cmd: "/usr/bin/python3 --version"
  - id: bash
    name: "Bash"
    source: "solution.sh"
    run:
      cmd: "/bin/bash"
      args: ["{{source}}"]
      limits:
        wall_time_s: 9
        max_processes: 64
        memory_kb: 524288
    version_cmd: "/bin/bash --version"
