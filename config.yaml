---
version: "0.1.0"
nsjail_path: "/usr/local/bin/nsjail"
default_common_settings: 
  nsjail_args: "-B /bin -B /usr -B /lib -B /dev -B /etc -B /var -B /dev"
languages:
  - id: c
    name: C
    source: "test.c"
    build:
      cmd: "/usr/bin/gcc"
      args: ["{{flags}}","-o", "a.out", "{{source}}"]
      limits:
        wall_time_s: 10
        max_processes: 100
        memory_kb: 524288
    run:
      cmd: "a.out"
      limits:
        wall_time_s: 3
        max_processes: 64
        memory_kb: 524288
    version_cmd: "/usr/bin/gcc --version"
  - id: py
    name: "Python 2.7"
    source: "test.py"
    run:
      cmd: "/usr/local/bin/python2.7"
      args: ["{{source}}"]
      limits:
        wall_time_s: 9
        max_processes: 100
        memory_kb: 102400
    version_cmd: "/usr/local/bin/python2.7 --version"
  - id: cpp
    name: "C++"
    source: "test.cpp"
    build:
      cmd: "/usr/bin/g++"
      args: ["{{flags}}","-o", "a.out", "{{source}}"]
      limits:
        wall_time_s: 10
        max_processes: 100
        memory_kb: 524288
    run:
      cmd: "a.out"
      limits:
        wall_time_s: 3
        max_processes: 64
        memory_kb: 524288
    version_cmd: "/usr/bin/g++ --version"
