request:
  language: c
  source: "#include <stdio.h>\nint main() { printf(\"extra args test\"); return 0; }"
  source_filename: solution.c
  artifact_filename: solution
  build:
    limits:
      wall_time_s: 3
      memory_kb: 1024
      max_processes: 1
    flags:
      - "-std=c99"
      - "-Wall"
  run:
    limits:
      wall_time_s: 5
      memory_kb: 524288
      max_processes: 64
  tests:
    - stdin: ""
      expected_stdout: "extra args test"

expected:
  status: success
  tests:
    - status: accepted
      stdout: "extra args test"
