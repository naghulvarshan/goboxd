request:
  language: cpp
  source: "#include <iostream>\nint main() { std::cout << \"extra args test\"; return 0; }"
  source_filename: solution.cpp
  artifact_filename: solution
  build:
    limits:
      wall_time_s: 3
      memory_kb: 1024
      max_processes: 1
    flags:
      - "--std=c++17"
      - "-Wall"
  run:
    limits:
      wall_time_s: 5
      memory_kb: 524288
      max_processes: 64
  tests:
    - stdin: ""
      expected_stdout: "extra args test"

expected:
  status: success
  tests:
    - status: success
      stdout: "extra args test"
