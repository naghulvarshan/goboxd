request:
  language: java
  source: |
    import java.util.*;
    public class MemoryHigh {
        public static void main(String[] args) {
            List<Integer> list = new ArrayList<>();
            Map<Integer, String> map = new HashMap<>();
            for (int i = 0; i < 10000; i++) {
                list.add(i);
                map.put(i, "Value_" + i);
            }
            int sum = 0;
            for (Integer num : list) sum += num % 100;
            System.out.println("List size: " + list.size());
            System.out.println("Map size: " + map.size());
            System.out.println("Checksum: " + sum);
        }
    }
  source_filename: MemoryHigh.java
  artifact_filename: MemoryHigh
  build:
    limits:
      wall_time_s: 6
      memory_kb: 102400
      max_processes: 1
  run:
