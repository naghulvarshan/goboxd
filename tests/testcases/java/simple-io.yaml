  language: java
  source: |
    import java.util.Scanner;
    public class SimpleIO {
        public static void main(String[] args) {
            Scanner sc = new Scanner(System.in);
            int a = sc.nextInt();
            int b = sc.nextInt();
            System.out.println("Sum: " + (a + b));
            System.out.println("Product: " + (a * b));
            sc.close();
        }
    }
