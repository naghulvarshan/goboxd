request:
  language: java
  source: |
    public class TimeModerate {
        public static void main(String[] args) {
            int count = 0, num = 2;
            while (count < 1000) {
                boolean isPrime = true;
                for (int i = 2; i * i <= num; i++) {
                    if (num % i == 0) { isPrime = false; break; }
                }
                if (isPrime) count++;
                num++;
            }
            System.out.println("The 1000th prime is: " + (num - 1));
        }
    }
  source_filename: TimeModerate.java
  artifact_filename: TimeModerate
  build:
    limits:
      wall_time_s: 6
      memory_kb: 102400
      max_processes: 1
