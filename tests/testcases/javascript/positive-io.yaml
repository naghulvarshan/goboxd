request:
  language: javascript
  source: |
    const fs = require('fs');
    const input = fs.readFileSync(0, 'utf8').trim();
    const n = parseInt(input);
    for (let i = 1; i <= n; i++) {
        console.log(`Line ${i}`);
    }
  source_filename: solution.js
  run:
    limits:
      wall_time_s: 5
      memory_kb: 524288
      max_processes: 64
  tests:
    - stdin: "3"
      expected_stdout: "Line 1\nLine 2\nLine 3\n"

expected:
  status: success
  tests:
    - status: success
      stdout: "Line 1\nLine 2\nLine 3\n"
